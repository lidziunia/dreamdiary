<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pamiętnik Snów</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        navy: { 800: '#1a2a4a', 900: '#0b1b3d' },
                        gold: { 400: '#fbbf24', 500: '#d4af37' }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Dodana czcionka Caveat dla pisma odręcznego -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap');

        body { font-family: 'Quicksand', sans-serif; }
        .font-dreamy { font-family: 'Dancing Script', cursive; }
        .font-handwriting { font-family: 'Caveat', cursive; font-size: 1.5rem; line-height: 1.4; }

        @keyframes floatCloud {
            0% { transform: translateX(-15vw); }
            100% { transform: translateX(115vw); }
        }

        .animate-float-slow { animation: floatCloud 45s linear infinite; }
        .animate-float-medium { animation: floatCloud 35s linear infinite; }
        .animate-float-fast { animation: floatCloud 25s linear infinite; }
        
        @keyframes textGlowLight {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 181, 167, 0.4), 0 0 20px rgba(255, 181, 167, 0.2); }
            50% { text-shadow: 0 0 20px rgba(255, 181, 167, 0.8), 0 0 35px rgba(255, 181, 167, 0.5), 0 0 40px rgba(255, 235, 59, 0.3); }
        }
        @keyframes textGlowDark {
            0%, 100% { text-shadow: 0 0 10px rgba(212, 175, 55, 0.4), 0 0 20px rgba(212, 175, 55, 0.2); }
            50% { text-shadow: 0 0 20px rgba(212, 175, 55, 0.8), 0 0 35px rgba(212, 175, 55, 0.5), 0 0 40px rgba(255, 235, 59, 0.4); }
        }

        .animate-glow { animation: textGlowLight 3s ease-in-out infinite; }
        html.dark .animate-glow { animation: textGlowDark 3s ease-in-out infinite; }

        @keyframes spinMoon {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.05); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .moon-spin {
            animation: spinMoon 1s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center center;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ffc8dd; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ffb5a7; }
        
        html.dark ::-webkit-scrollbar-thumb { background: #d4af37; }
        html.dark ::-webkit-scrollbar-thumb:hover { background: #fbbf24; }

        .modal-enter { animation: zoomIn 0.2s ease-out forwards; }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        /* Warstwa paralaksy płynne przejście by nie skakało */
        .parallax-layer { transition: transform 0.1s ease-out; }

        /* --- NOWE STYLE (Komety i Reality Check) --- */
        @keyframes cometFall {
            0% { transform: translate(-20vw, -20vh) rotate(45deg); opacity: 1; }
            100% { transform: translate(120vw, 120vh) rotate(45deg); opacity: 0; }
        }
        .animate-comet { animation: cometFall 4s linear forwards; }
        
        @keyframes pulseCheck {
            0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(212, 175, 55, 0.8); }
        }
        .reality-check-btn { animation: pulseCheck 3s infinite; }
        html.dark .reality-check-btn { animation: pulseCheck 3s infinite; }

        /* --- NOWE EFEKTY WIZUALNE --- */
        @keyframes bgBreatheLight {
            0%, 100% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
        }
        @keyframes bgBreatheDark {
            0%, 100% { background-position: 100% 100%; }
            50% { background-position: 0% 0%; }
        }
        .bg-breathe {
            background-size: 150% 150%;
            animation: bgBreatheLight 15s ease-in-out infinite;
        }
        html.dark .bg-breathe {
            animation: bgBreatheDark 15s ease-in-out infinite;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.5);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.4), 0 8px 32px rgba(0, 0, 0, 0.05);
        }
        html.dark .glass-card {
            background: rgba(30, 41, 59, 0.45);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(0, 0, 0, 0.2);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05), 0 8px 32px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="bg-breathe min-h-screen transition-colors duration-500 bg-gradient-to-b from-[#bde0fe] to-[#fefae0] dark:from-navy-900 dark:to-navy-800 relative overflow-x-hidden selection:bg-[#ffc8dd] dark:selection:bg-gold-500 selection:text-white pb-20">

    <!-- Urocza muzyka w tle (ukryty tag audio) -->
    <!-- Używamy darmowej, bardzo relaksującej melodii Lofi/Ambient -->
    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/05/16/audio_9b91864190.mp3" type="audio/mpeg">
    </audio>

    <div id="star-container" class="fixed inset-0 pointer-events-none z-50 overflow-hidden"></div>
    <div id="comet-container" class="fixed inset-0 pointer-events-none z-0 overflow-hidden"></div>
    <div id="toast-container" class="fixed bottom-24 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Przycisk Reality Check -->
    <button onclick="app.doRealityCheck()" class="reality-check-btn fixed bottom-6 left-6 z-40 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md px-4 py-3 rounded-full border-2 border-[#ffb5a7] dark:border-gold-500 text-[#ffb5a7] dark:text-gold-500 font-bold flex items-center gap-2 hover:bg-[#ffb5a7] hover:text-white dark:hover:bg-gold-500 dark:hover:text-navy-900 transition-colors cursor-pointer">
        <i data-lucide="eye" class="w-5 h-5"></i>
        <span class="hidden md:inline">Czy to sen?</span>
    </button>

    <!-- Przyciski Narzędziowe -->
    <div class="fixed top-6 right-6 z-40 flex gap-3">
        <!-- Przycisk Muzyki -->
        <button onclick="app.toggleMusic()" id="btn-music" class="bg-white/50 dark:bg-slate-800/50 backdrop-blur-md p-3 rounded-full shadow-lg border border-white dark:border-slate-700 text-gray-400 dark:text-gray-500 hover:scale-110 transition-all">
            <i data-lucide="music" class="w-6 h-6"></i>
        </button>
        <!-- Przełącznik Dark Mode -->
        <button onclick="app.toggleTheme()" class="bg-white/50 dark:bg-slate-800/50 backdrop-blur-md p-3 rounded-full shadow-lg border border-white dark:border-slate-700 text-[#ffb5a7] dark:text-gold-400 hover:scale-110 transition-transform">
            <i data-lucide="moon" id="theme-icon-moon" class="w-6 h-6 hidden dark:block"></i>
            <i data-lucide="sun" id="theme-icon-sun" class="w-6 h-6 block dark:hidden"></i>
        </button>
    </div>

    <!-- Tło: Świecący, DUŻY księżyc z Paralaksą -->
    <div id="moon-parallax" class="parallax-layer fixed left-[-2rem] md:left-4 top-16 z-0 flex items-center justify-center" style="filter: drop-shadow(0px 0px 45px rgba(255, 235, 59, 0.95))">
        <svg id="moon-svg" width="350" height="350" viewBox="0 0 100 100" class="transition-transform duration-300">
            <path d="M 55 10 A 40 40 0 1 0 95 50 A 30 30 0 1 1 55 10 Z" fill="#FFF59D"/>
            <!-- Śpiące oczko -->
            <path d="M 30 45 Q 38 52 46 45" stroke="#D4AF37" stroke-width="2.5" fill="none" stroke-linecap="round" />
            <path d="M 34 48 L 32 52 M 42 48 L 44 52 M 38 50 L 38 54" stroke="#D4AF37" stroke-width="2" fill="none" stroke-linecap="round" />
            <!-- Rumieniec -->
            <circle cx="25" cy="52" r="5" fill="#FFCDD2" opacity="0.8" />
        </svg>
    </div>

    <!-- Tło: Chmurki z Paralaksą -->
    <div class="fixed top-12 left-0 w-full h-full pointer-events-none z-0">
        <div id="cloud-1" class="parallax-layer absolute top-[10%] w-full h-full">
            <svg class="animate-float-slow opacity-80 dark:opacity-30" style="filter: drop-shadow(0px 0px 15px rgba(255, 255, 255, 0.9));" width="120" viewBox="0 0 24 24" fill="white">
                <path d="M17.5 19c2.48 0 4.5-2.02 4.5-4.5S19.98 10 17.5 10c-.17 0-.34.01-.51.04C16.43 7.15 13.94 5 11 5 7.69 5 5 7.69 5 11c0 .16.01.32.03.48C2.69 11.83 1 13.72 1 16c0 2.76 2.24 5 5 5h11.5z"/>
            </svg>
        </div>
        <div id="cloud-2" class="parallax-layer absolute top-[35%] w-full h-full">
            <svg class="animate-float-fast opacity-60 dark:opacity-25" style="filter: drop-shadow(0px 0px 20px rgba(255, 255, 255, 0.8));" width="160" viewBox="0 0 24 24" fill="white">
                <path d="M17.5 19c2.48 0 4.5-2.02 4.5-4.5S19.98 10 17.5 10c-.17 0-.34.01-.51.04C16.43 7.15 13.94 5 11 5 7.69 5 5 7.69 5 11c0 .16.01.32.03.48C2.69 11.83 1 13.72 1 16c0 2.76 2.24 5 5 5h11.5z"/>
            </svg>
        </div>
        <div id="cloud-3" class="parallax-layer absolute top-[60%] w-full h-full">
            <svg class="animate-float-medium opacity-70 dark:opacity-35" style="filter: drop-shadow(0px 0px 12px rgba(255, 255, 255, 0.9));" width="100" viewBox="0 0 24 24" fill="white">
                <path d="M17.5 19c2.48 0 4.5-2.02 4.5-4.5S19.98 10 17.5 10c-.17 0-.34.01-.51.04C16.43 7.15 13.94 5 11 5 7.69 5 5 7.69 5 11c0 .16.01.32.03.48C2.69 11.83 1 13.72 1 16c0 2.76 2.24 5 5 5h11.5z"/>
            </svg>
        </div>
    </div>

    <!-- Główna zawartość -->
    <div class="relative z-10 container mx-auto px-4 flex flex-col items-center pt-24">
        
        <h1 class="font-dreamy text-6xl md:text-8xl text-[#ffb5a7] dark:text-gold-500 animate-glow mb-4 text-center">
            Dream Diary
        </h1>

        <button onclick="app.handleAddClick()" class="group relative bg-white/80 dark:bg-slate-800/80 hover:bg-white dark:hover:bg-slate-700 text-[#ffb5a7] dark:text-gold-400 font-bold text-lg px-8 py-4 rounded-full shadow-[0_8px_15px_rgba(255,181,167,0.3)] dark:shadow-[0_8px_15px_rgba(212,175,55,0.2)] hover:shadow-[0_12px_25px_rgba(255,181,167,0.5)] dark:hover:shadow-[0_12px_25px_rgba(212,175,55,0.4)] transition-all duration-300 flex items-center gap-2 transform hover:-translate-y-1 mb-12 backdrop-blur-sm border border-white dark:border-slate-600">
            <i data-lucide="plus" class="group-hover:rotate-90 transition-transform duration-300"></i>
            <span>Add</span>
        </button>

        <div class="flex bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm rounded-full p-1 mb-8 border border-white dark:border-slate-700 shadow-sm flex-wrap justify-center gap-1" id="nav-buttons">
            <button onclick="app.setView('list')" id="btn-list" class="px-6 py-2 rounded-full font-bold transition-colors flex items-center gap-2 bg-white dark:bg-slate-700 text-[#ffb5a7] dark:text-gold-400 shadow-sm">
                <i data-lucide="list" class="w-4 h-4"></i> Lista
            </button>
            <button onclick="app.setView('calendar')" id="btn-calendar" class="px-6 py-2 rounded-full font-bold transition-colors flex items-center gap-2 text-gray-500 dark:text-gray-300 hover:bg-white/30 dark:hover:bg-slate-700/50">
                <i data-lucide="calendar" class="w-4 h-4"></i> Kalendarz
            </button>
            <button onclick="app.setView('concepts')" id="btn-concepts" class="px-6 py-2 rounded-full font-bold transition-colors flex items-center gap-2 text-gray-500 dark:text-gray-300 hover:bg-white/30 dark:hover:bg-slate-700/50">
                <i data-lucide="sparkles" class="w-4 h-4"></i> Koncepty
            </button>
            <button onclick="app.setView('stats')" id="btn-stats" class="px-6 py-2 rounded-full font-bold transition-colors flex items-center gap-2 text-gray-500 dark:text-gray-300 hover:bg-white/30 dark:hover:bg-slate-700/50">
                <i data-lucide="pie-chart" class="w-4 h-4"></i> Statystyki
            </button>
        </div>

        <div id="app-content" class="w-full max-w-3xl flex flex-col items-center"></div>

    </div>

    <!-- Modal Formularza -->
    <div id="dream-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-[#bde0fe]/40 dark:bg-navy-900/60 backdrop-blur-sm" onclick="app.closeModal()"></div>
        <div class="relative glass-card w-full max-w-lg rounded-[2.5rem] p-8 modal-enter max-h-[90vh] overflow-y-auto">
            
            <button onclick="app.closeModal()" class="absolute top-6 right-6 bg-gray-100 dark:bg-slate-700 hover:bg-gray-200 dark:hover:bg-slate-600 p-2 rounded-full text-gray-500 dark:text-gray-300 transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>

            <h2 class="font-dreamy text-4xl text-[#ffb5a7] dark:text-gold-500 mb-6 text-center">Spisz swój sen ☁️</h2>

            <div class="space-y-5">
                <div>
                    <label class="block text-gray-500 dark:text-gray-300 font-bold mb-2 ml-2">Wybierz datę</label>
                    <input type="date" id="form-date" class="w-full p-4 rounded-2xl bg-gray-50 dark:bg-slate-700 border-2 border-[#ffc8dd]/30 dark:border-slate-600 focus:border-[#ffb5a7] dark:focus:border-gold-500 outline-none text-gray-600 dark:text-gray-200 font-bold transition-colors" />
                </div>

                <div class="bg-gray-50 dark:bg-slate-700/50 p-4 rounded-2xl border-2 border-transparent">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" id="form-forgot" onchange="app.toggleForgotState()" class="w-5 h-5 rounded text-[#ffb5a7] dark:text-gold-500 focus:ring-[#ffb5a7] dark:focus:ring-gold-500 border-gray-300 dark:border-slate-500 accent-[#ffb5a7] dark:accent-gold-500" />
                        <span class="font-bold text-gray-600 dark:text-gray-300">Nie pamiętam dzisiejszego snu ☁️</span>
                    </label>
                </div>

                <div id="form-details" class="space-y-5 transition-all duration-300">
                    
                    <!-- Samopoczucie -->
                    <div>
                        <label class="block text-gray-500 dark:text-gray-300 font-bold mb-2 ml-2">Jak się obudziłaś?</label>
                        <div class="flex gap-2 justify-between" id="mood-container">
                            <!-- Emotki generowane z JS -->
                        </div>
                    </div>

                    <div>
                        <label class="block text-gray-500 dark:text-gray-300 font-bold mb-2 ml-2">Kategoria</label>
                        <div class="grid grid-cols-2 gap-3" id="category-container"></div>
                    </div>

                    <div>
                        <label class="block text-gray-500 dark:text-gray-300 font-bold mb-2 ml-2">Opisz swój sen...</label>
                        <!-- Klasa font-handwriting dodaje piękne pismo odręczne -->
                        <textarea id="form-content" placeholder="Zaczęło się od tego, że..." oninput="app.validateForm()" class="font-handwriting w-full p-4 rounded-2xl bg-gray-50 dark:bg-slate-700 border-2 border-[#ffc8dd]/30 dark:border-slate-600 focus:border-[#ffb5a7] dark:focus:border-gold-500 outline-none text-gray-700 dark:text-gray-200 min-h-[150px] resize-none transition-colors"></textarea>
                    </div>
                </div>

                <button id="btn-save" onclick="app.saveDream(event)" disabled class="w-full bg-[#ffb5a7] dark:bg-gold-500 hover:bg-[#ff9aa2] dark:hover:bg-gold-400 disabled:bg-gray-200 dark:disabled:bg-slate-600 disabled:text-gray-400 disabled:cursor-not-allowed text-white dark:text-navy-900 font-bold text-lg py-4 rounded-full transition-all shadow-lg hover:shadow-xl mt-4">
                    Zapisz sen ✨
                </button>
            </div>
        </div>
    </div>

    <!-- Skrypt aplikacji -->
    <script>
        const CATEGORIES = [
            { id: 'dziwny', label: 'Dziwny 🌀', color: 'bg-[#cdb4db] dark:bg-[#a581ba] text-white', glowLight: 'rgba(205, 180, 219, 0.5)', glowDark: 'rgba(165, 129, 186, 0.4)' },
            { id: 'koszmar', label: 'Koszmar 👻', color: 'bg-[#9d4edd] dark:bg-[#7a3cb5] text-white', glowLight: 'rgba(157, 78, 221, 0.5)', glowDark: 'rgba(122, 60, 181, 0.4)' },
            { id: 'przygoda', label: 'Przygoda 🌟', color: 'bg-[#ffc8dd] dark:bg-[#e891b0] text-white dark:text-navy-900', glowLight: 'rgba(255, 200, 221, 0.5)', glowDark: 'rgba(232, 145, 176, 0.4)' },
            { id: 'lucid', label: 'Lucid Dream 👁️✨', color: 'bg-[#a2d2ff] dark:bg-[#6baaf5] text-white dark:text-navy-900', glowLight: 'rgba(162, 210, 255, 0.5)', glowDark: 'rgba(107, 170, 245, 0.4)' },
            { id: 'powtarzalny', label: 'Powtarzalny 🔁', color: 'bg-[#ffb4a2] dark:bg-[#e5989b] text-white dark:text-navy-900', glowLight: 'rgba(255, 180, 162, 0.5)', glowDark: 'rgba(229, 152, 155, 0.4)' },
            { id: 'falszywe', label: 'Fałszywe 🚪', color: 'bg-[#ffddd2] dark:bg-[#e29578] text-gray-800 dark:text-navy-900', glowLight: 'rgba(255, 221, 210, 0.5)', glowDark: 'rgba(226, 149, 120, 0.4)' }
        ];

        const MOODS = [
            { id: 'great', emoji: '😌', label: 'Wypoczęta' },
            { id: 'sleepy', emoji: '😴', label: 'Zaspana' },
            { id: 'weird', emoji: '😵‍💫', label: 'Dziwnie' },
            { id: 'tired', emoji: '😫', label: 'Zmęczona' }
        ];

        const app = {
            dreams: [],
            view: 'list', 
            currentMonth: new Date(),
            formCategory: '',
            formMood: '',
            filterCategory: 'all',
            chartInstance: null,
            audioCtx: null,
            isMusicPlaying: false,
            
            // AI State
            isAnalyzing: false,
            concepts: [],
            aiError: null,

            init() {
                if (localStorage.getItem('kawaii-theme') === 'dark' || (!('kawaii-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark');
                }

                const saved = localStorage.getItem('kawaii-dream-diary');
                if (saved) {
                    try { this.dreams = JSON.parse(saved); } catch(e) { console.error(e); }
                }

                this.renderCategoryButtons();
                this.renderMoodButtons();
                document.getElementById('form-date').value = this.getTodayString();
                lucide.createIcons();
                this.render();
                this.initCursorStars();
                this.initParallax();
                this.initComets();

                // Dodanie globalnego nasłuchiwacza na dźwięk kliknięcia dla przycisków
                document.addEventListener('click', (e) => {
                    if(e.target.closest('button') || e.target.closest('input[type="checkbox"]')) {
                        this.playMagicClick();
                    }
                });
            },

            // --- Efekty Dźwiękowe (Audio API i Tło) ---
            playMagicClick() {
                // Generowanie delikatnego, błyszczącego dźwięku (sine wave) by nie pobierać plików z zewnątrz
                if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.audioCtx.state === 'suspended') this.audioCtx.resume();

                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                
                osc.type = 'sine';
                // Wysoki ton, który szybko opada (efekt iskierek)
                osc.frequency.setValueAtTime(1200, this.audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(800, this.audioCtx.currentTime + 0.1);
                
                gain.gain.setValueAtTime(0.05, this.audioCtx.currentTime); // cicho
                gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + 0.1);
                
                osc.connect(gain);
                gain.connect(this.audioCtx.destination);
                
                osc.start();
                osc.stop(this.audioCtx.currentTime + 0.1);
            },

            toggleMusic() {
                const audio = document.getElementById('bg-music');
                const btn = document.getElementById('btn-music');
                
                if (this.isMusicPlaying) {
                    audio.pause();
                    btn.classList.remove('text-[#ffb5a7]', 'dark:text-gold-400');
                    btn.classList.add('text-gray-400', 'dark:text-gray-500');
                } else {
                    audio.volume = 0.2; // cichutko
                    audio.play().catch(e => console.log("Przeglądarka zablokowała audio", e));
                    btn.classList.remove('text-gray-400', 'dark:text-gray-500');
                    btn.classList.add('text-[#ffb5a7]', 'dark:text-gold-400');
                }
                this.isMusicPlaying = !this.isMusicPlaying;
            },

            // --- Efekt Paralaksy ---
            initParallax() {
                const moon = document.getElementById('moon-parallax');
                const c1 = document.getElementById('cloud-1');
                const c2 = document.getElementById('cloud-2');
                const c3 = document.getElementById('cloud-3');

                window.addEventListener('mousemove', (e) => {
                    // Obliczamy pozycję myszy względem środka ekranu (-1 do 1)
                    const x = (e.clientX / window.innerWidth) - 0.5;
                    const y = (e.clientY / window.innerHeight) - 0.5;

                    // Aplikujemy przesunięcia (mnożnik decyduje o sile efektu)
                    if(moon) moon.style.transform = `translate(${x * -30}px, ${y * -30}px)`;
                    if(c1) c1.style.transform = `translate(${x * -15}px, ${y * -15}px)`;
                    if(c2) c2.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
                    if(c3) c3.style.transform = `translate(${x * -10}px, ${y * -10}px)`;
                });
            },

            toggleTheme() {
                document.documentElement.classList.toggle('dark');
                const isDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('kawaii-theme', isDark ? 'dark' : 'light');
                this.render();
            },

            getTodayString() {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            },

            saveToLocal() {
                localStorage.setItem('kawaii-dream-diary', JSON.stringify(this.dreams));
            },

            handleAddClick() {
                const moon = document.getElementById('moon-svg');
                moon.classList.remove('moon-spin');
                void moon.offsetWidth; 
                moon.classList.add('moon-spin');
                this.openModal();
            },

            setView(newView) {
                this.view = newView;
                const btnIds = ['list', 'calendar', 'concepts', 'stats'];
                btnIds.forEach(id => {
                    const btn = document.getElementById(`btn-${id}`);
                    if(id === newView) {
                        btn.className = `px-6 py-2 rounded-full font-bold transition-colors flex items-center gap-2 bg-white dark:bg-slate-700 text-[#ffb5a7] dark:text-gold-400 shadow-sm`;

                        btn.className = `px-6 py-2 rounded-full font-bold transition-colors flex items-center gap-2 text-gray-500 dark:text-gray-300 hover:bg-white/30 dark:hover:bg-slate-700/50`;

            render() {

            getListView() {
                let html = '<div class="w-full max-w-2xl flex flex-col gap-6">';

                // Filtry Lupy
                html += `
                    <div class="glass-card p-4 rounded-3xl flex flex-wrap gap-2 justify-center items-center">
                        <span class="text-gray-500 dark:text-gray-300 font-bold mr-2"><i data-lucide="search" class="w-4 h-4 inline"></i> Szukaj:</span>
                        <button onclick="app.setFilter('all')" class="px-4 py-1.5 rounded-full text-xs font-bold transition-all ${this.filterCategory === 'all' ? 'bg-[#ffb5a7] dark:bg-gold-500 text-white dark:text-navy-900 shadow-md' : 'bg-gray-100 dark:bg-slate-700 text-gray-500 dark:text-gray-300 hover:bg-gray-200'}">Wszystkie</button>
                        ${CATEGORIES.map(c => `
                            <button onclick="app.setFilter('${c.id}')" class="px-4 py-1.5 rounded-full text-xs font-bold transition-all ${this.filterCategory === c.id ? c.color + ' shadow-md scale-105' : 'bg-gray-100 dark:bg-slate-700 text-gray-500 dark:text-gray-300 hover:bg-gray-200'}">${c.label.split(' ')[0]}</button>
                        `).join('')}
                    </div>
                `;

                // Logika Filtrowania
                let filteredDreams = this.dreams;
                if (this.filterCategory !== 'all') {
                    filteredDreams = this.dreams.filter(d => d.category === this.filterCategory);
                }

                if (filteredDreams.length === 0) {
                    html += `
                        <div class="glass-card w-full p-10 rounded-[2rem] text-center mt-4">
                            <p class="text-gray-500 dark:text-gray-300 font-bold text-xl mb-2">Brak snów w tej kategorii ☁️</p>
                        </div>
                    `;
                    html += '</div>';
                    return html;
                }

                filteredDreams.forEach(dream => {
                    const catInfo = CATEGORIES.find(c => c.id === dream.category);
                    const catHtml = (!dream.forgot && dream.category && catInfo) ? 
                        `<div class="px-4 py-1.5 rounded-full text-sm font-bold shadow-sm ${catInfo.color}">${catInfo.label}</div>` : '';
                    
                    const moodInfo = MOODS.find(m => m.id === dream.mood);
                    const moodHtml = (!dream.forgot && dream.mood && moodInfo) ? 
                        `<span class="text-xl ml-2" title="${moodInfo.label}">${moodInfo.emoji}</span>` : '';

                    const contentHtml = dream.forgot ? 
                        `<p class="text-gray-500 dark:text-gray-400 italic text-lg text-center py-4 opacity-70">☁️ Nie pamiętam tego snu... ☁️</p>` :
                        `<p class="font-handwriting text-gray-700 dark:text-gray-200 whitespace-pre-wrap">${dream.content}</p>`;

                    // Aura zależna od trybu i kategorii
                    const isDark = document.documentElement.classList.contains('dark');
                    let auraStyle = '';
                    if (catInfo) {
                        const glowColor = isDark ? catInfo.glowDark : catInfo.glowLight;
                        auraStyle = `box-shadow: 0 4px 25px ${glowColor}; border-color: ${glowColor.replace('0.4', '0.2').replace('0.5', '0.2')};`;
                    }

                    html += `
                        <div style="${auraStyle}" class="glass-card p-6 rounded-[2rem] transition-all hover:scale-[1.01] relative group">
                            <div class="flex justify-between items-start mb-4">
                                <div class="bg-white/80 dark:bg-slate-700 px-4 py-1.5 rounded-full text-sm font-bold text-[#ffb5a7] dark:text-gold-400 shadow-sm flex items-center gap-2">
                                    <i data-lucide="calendar" class="w-4 h-4"></i> ${dream.date} ${moodHtml}
                                </div>
                                ${catHtml}
                            </div>
                            ${contentHtml}
                            <button onclick="app.openModalForDate('${dream.date}')" class="absolute top-6 right-6 opacity-0 group-hover:opacity-100 transition-opacity bg-white dark:bg-slate-700 p-2 rounded-full shadow-sm text-gray-400 dark:text-gray-300 hover:text-[#ffb5a7] dark:hover:text-gold-400">
                                Edytuj

                    `;
                });
                html += '</div>';
                return html;
            },

            setFilter(catId) {
                this.filterCategory = catId;
                this.playMagicClick();
                this.render();
            },

            getCalendarView() {
                const year = this.currentMonth.getFullYear();
                const month = this.currentMonth.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const startDay = firstDay === 0 ? 6 : firstDay - 1; 
                const monthNames = ['Styczeń', 'Luty', 'Marzec', 'Kwiecień', 'Maj', 'Czerwiec', 'Lipiec', 'Sierpień', 'Wrzesień', 'Październik', 'Listopad', 'Grudzień'];

                let daysHtml = '';
                for (let i = 0; i < startDay; i++) { daysHtml += `<div class="p-2"></div>`; }

                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const dream = this.dreams.find(d => d.date === dateStr);
                    const isToday = dateStr === this.getTodayString();

                    const baseClasses = "p-3 rounded-2xl border-2 transition-all flex flex-col items-center justify-center min-h-[80px]";
                    const activeClasses = isToday ? "border-[#ffb5a7] dark:border-gold-500 bg-white dark:bg-slate-700 text-[#ffb5a7] dark:text-gold-400" : "border-transparent bg-white/40 dark:bg-slate-800/40 hover:bg-white/70 dark:hover:bg-slate-800/70 text-gray-600 dark:text-gray-300";
                    
                    let dreamEmoji = '';
                    if (dream) {
                        if(dream.forgot) dreamEmoji = '☁️';
                        else {
                            const cInfo = CATEGORIES.find(c => c.id === dream.category);
                            dreamEmoji = cInfo ? cInfo.label.split(' ')[1] : '📝';
                            const mInfo = MOODS.find(m => m.id === dream.mood);
                            if(mInfo) dreamEmoji += `<span class="text-xs ml-1">${mInfo.emoji}</span>`;
                        }
                    }

                    daysHtml += `
                        <button onclick="app.openModalForDate('${dateStr}')" class="${baseClasses} ${activeClasses} ${dream ? "shadow-sm" : ""}">
                            <span class="font-bold text-lg">${day}</span>
                            ${dream ? `<div class="mt-1 flex gap-0 items-center">${dreamEmoji}</div>` : ''}

                    `;
                }

                return `
                    <div class="w-full glass-card p-6 rounded-[2rem]">
                        <div class="flex justify-between items-center mb-6 px-4">
                            <button onclick="app.changeMonth(-1)" class="text-[#ffb5a7] dark:text-gold-500 hover:text-[#ffc8dd] dark:hover:text-gold-400 font-bold text-xl p-2">&lt;</button>
                            <h2 class="text-2xl font-dreamy text-gray-700 dark:text-gray-200">${monthNames[month]} ${year}</h2>
                            <button onclick="app.changeMonth(1)" class="text-[#ffb5a7] dark:text-gold-500 hover:text-[#ffc8dd] dark:hover:text-gold-400 font-bold text-xl p-2">&gt;</button>
                        </div>
                        <div class="grid grid-cols-7 gap-2 mb-2 px-2 text-center text-gray-500 dark:text-gray-400 font-bold text-sm">
                            <div>Pn</div><div>Wt</div><div>Śr</div><div>Cz</div><div>Pt</div><div>Sb</div><div>Nd</div>
                        </div>
                        <div class="grid grid-cols-7 gap-2">
                            ${daysHtml}
                        </div>
                    </div>
                `;
            },

            changeMonth(delta) {
                this.currentMonth.setMonth(this.currentMonth.getMonth() + delta);
                this.render();
            },

            getConceptsView() {
                const btnText = this.isAnalyzing ? 'Magia się dzieje... 🪄' : 'Zbadaj moje sny 🌟';
                const disabledProp = (this.isAnalyzing || this.dreams.length === 0) ? 'disabled' : '';
                
                let errorHtml = '';
                if(this.aiError) errorHtml = `<p class="text-[#ffb5a7] dark:text-gold-400 mt-4 font-bold bg-white/50 dark:bg-slate-800/50 py-2 px-4 rounded-xl inline-block">${this.aiError}</p>`;
                if(this.dreams.length === 0 && !this.aiError) errorHtml = `<p class="text-[#ffb5a7] dark:text-gold-400 mt-4 font-bold bg-white/50 dark:bg-slate-800/50 py-2 px-4 rounded-xl inline-block">Najpierw musisz dodać jakiś sen!</p>`;

                let conceptsHtml = '';
                if (this.concepts.length > 0) {
                    conceptsHtml += `<div class="w-full grid grid-cols-1 md:grid-cols-2 gap-4 mt-6 modal-enter">`;
                    this.concepts.forEach(concept => {
                        conceptsHtml += `
                            <div class="glass-card p-6 rounded-[2rem] hover:shadow-md transition-all group text-left">
                                <div class="text-4xl mb-3 transform group-hover:scale-110 transition-transform origin-left">${concept.emoji}</div>
                                <h3 class="text-xl font-bold text-[#ffb5a7] dark:text-gold-400 mb-2">${concept.name}</h3>
                                <p class="text-gray-600 dark:text-gray-300 font-medium leading-relaxed">${concept.description}</p>
                            </div>
                        `;
                    });
                    conceptsHtml += `</div>`;
                }

                return `
                    <div class="w-full flex flex-col items-center">
                        <div class="glass-card p-8 rounded-[2rem] w-full text-center">
                            <h2 class="text-3xl font-dreamy text-[#ffb5a7] dark:text-gold-400 mb-4 flex items-center justify-center gap-2">
                                <i data-lucide="sparkles" class="text-yellow-400 fill-yellow-400 w-6 h-6"></i> Senny Analityk AI <i data-lucide="sparkles" class="text-yellow-400 fill-yellow-400 w-6 h-6"></i>
                            </h2>
                            <p class="text-gray-500 dark:text-gray-300 font-bold mb-6">Pozwól magicznej sztucznej inteligencji odkryć ukryte motywy w Twoich snach!</p>
                            <button onclick="app.analyzeDreams()" ${disabledProp} class="bg-gradient-to-r from-[#a2d2ff] to-[#cdb4db] dark:from-navy-800 dark:to-slate-700 hover:from-[#bde0fe] hover:to-[#ffc8dd] dark:hover:from-slate-700 dark:hover:to-navy-800 text-white dark:text-gold-400 dark:border dark:border-gold-500 font-bold py-3 px-8 rounded-full shadow-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed transform hover:-translate-y-1">
                                ${btnText}
                            </button>
                            <div>${errorHtml}</div>
                        </div>
                        ${conceptsHtml}
                    </div>
                `;
            },

            // --- Odznaki Logika ---
            getBadges() {
                const badges = [];
                const dLen = this.dreams.filter(d => !d.forgot).length;
                const lucidCount = this.dreams.filter(d => d.category === 'lucid').length;
                const weirdCount = this.dreams.filter(d => d.category === 'dziwny').length;

                if (dLen >= 1) badges.push({ icon: '🌱', name: 'Pierwszy Krok', desc: 'Zapisany pierwszy sen!' });
                if (dLen >= 5) badges.push({ icon: '🌙', name: 'Nocny Marek', desc: '5 snów w kolekcji.' });
                if (lucidCount >= 1) badges.push({ icon: '✨', name: 'Przebudzenie', desc: 'Twój pierwszy Lucid Dream!' });
                if (weirdCount >= 3) badges.push({ icon: '🌀', name: 'Kraina Czarów', desc: 'Aż 3 dziwne sny!' });
                if (this.dreams.filter(d => d.mood === 'great').length >= 3) badges.push({ icon: '😌', name: 'Poranny Ptaszek', desc: 'Często budzisz się wypoczęta.' });

                return badges;
            },

            calculateStreak() {
                if (this.dreams.length === 0) return 0;
                const uniqueDates = [...new Set(this.dreams.map(d => d.date))].sort((a, b) => new Date(b) - new Date(a));
                let currentStreak = 0;
                let d = new Date();
                d.setHours(0,0,0,0);
                
                let dateString = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                
                if (!uniqueDates.includes(dateString)) {
                    d.setDate(d.getDate() - 1);
                    dateString = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                }

                while (uniqueDates.includes(dateString)) {
                    currentStreak++;
                    d.setDate(d.getDate() - 1);
                    dateString = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                }
                return currentStreak;
            },

            getStatsView() {
                setTimeout(() => this.initChart(), 0);
                const badges = this.getBadges();
                const streak = this.calculateStreak();
                
                let streakHtml = '';
                if (streak > 0) {
                    streakHtml = `
                        <div class="w-full mt-8 pt-8 border-t border-[#ffc8dd]/50 dark:border-slate-600 text-center">
                            <h3 class="text-2xl font-dreamy text-gray-600 dark:text-gray-300 mb-2">Senna Konstelacja ✨</h3>
                            <p class="text-gray-500 dark:text-gray-400 font-bold mb-4">Twój obecny łańcuszek: <span class="text-[#ffb5a7] dark:text-gold-400">${streak} dni</span></p>
                            <div class="flex justify-center items-center gap-1">
                                ${Array.from({length: Math.min(streak, 7)}).map((_, i) => `<span class="text-2xl" style="animation: pulseCheck 2s infinite ${i*0.2}s">⭐</span>${i < Math.min(streak, 7) -1 ? '<span class="text-[#ffc8dd] dark:text-slate-600">-</span>' : ''}`).join('')}
                                ${streak > 7 ? '<span class="text-gray-400 dark:text-slate-500 font-bold ml-2">...</span>' : ''}
                            </div>
                        </div>
                    `;
                }

                let badgesHtml = '';
                if(badges.length > 0) {
                    badgesHtml = `<div class="w-full mt-8 pt-8 border-t border-[#ffc8dd]/50 dark:border-slate-600">
                        <h3 class="text-2xl font-dreamy text-gray-600 dark:text-gray-300 mb-4 text-center">Twoje Odznaki 🏆</h3>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                            ${badges.map(b => `
                                <div class="bg-white/80 dark:bg-slate-700/80 p-3 rounded-2xl flex flex-col items-center text-center shadow-sm">
                                    <span class="text-3xl mb-1">${b.icon}</span>
                                    <span class="font-bold text-sm text-[#ffb5a7] dark:text-gold-400">${b.name}</span>
                                    <span class="text-xs text-gray-500 dark:text-gray-400 leading-tight">${b.desc}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                }

                return `
                    <div class="w-full glass-card p-8 rounded-[2rem] flex flex-col items-center">
                        <h2 class="text-3xl font-dreamy text-[#ffb5a7] dark:text-gold-400 mb-8 flex items-center justify-center gap-2">
                            <i data-lucide="pie-chart" class="text-[#ffb5a7] dark:text-gold-400 w-6 h-6"></i> Kosmos Twoich Snów
                        </h2>
                        
                        ${this.dreams.length === 0 ? 
                            `<p class="text-gray-500 dark:text-gray-400 font-bold">Musisz dodać sny, by zobaczyć statystyki! ☁️</p>` :
                            `<div class="relative w-full max-w-sm mx-auto aspect-square">
                                <canvas id="dreamsChart"></canvas>
                             </div>`
                        }
                        
                        ${streakHtml}
                        ${badgesHtml}
                    </div>
                `;
            },

            initChart() {
                const ctx = document.getElementById('dreamsChart');
                if (!ctx) return;
                
                if (this.chartInstance) this.chartInstance.destroy();

                const counts = { dziwny: 0, koszmar: 0, przygoda: 0, lucid: 0, powtarzalny: 0, falszywe: 0, forgot: 0 };
                this.dreams.forEach(d => {
                    if (d.forgot) counts.forgot++;
                    else if (d.category && counts[d.category] !== undefined) counts[d.category]++;
                });

                const isDark = document.documentElement.classList.contains('dark');

                this.chartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Dziwny 🌀', 'Koszmar 👻', 'Przygoda 🌟', 'Lucid Dream ✨', 'Powtarzalny 🔁', 'Fałszywe 🚪', 'Zapomniane ☁️'],
                        datasets: [{
                            data: [counts.dziwny, counts.koszmar, counts.przygoda, counts.lucid, counts.powtarzalny, counts.falszywe, counts.forgot],
                            backgroundColor: [
                                isDark ? '#a581ba' : '#cdb4db', 
                                isDark ? '#7a3cb5' : '#9d4edd', 
                                isDark ? '#e891b0' : '#ffc8dd', 
                                isDark ? '#6baaf5' : '#a2d2ff', 
                                isDark ? '#e5989b' : '#ffb4a2',
                                isDark ? '#e29578' : '#ffddd2',
                                isDark ? '#475569' : '#e5e7eb'
                            ],
                            borderWidth: 3,
                            borderColor: isDark ? '#1e293b' : '#ffffff',
                            hoverOffset: 10
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: { padding: 20, color: isDark ? '#cbd5e1' : '#64748b', font: { family: 'Quicksand', weight: 'bold', size: 14 } }
                            }
                        },
                        animation: { animateScale: true, animateRotate: true }
                    }
                });
            },

            async analyzeDreams() {
                const apiKey = "";
                if (this.dreams.length === 0) return;
                
                this.isAnalyzing = true;
                this.aiError = null;
                this.render(); 

                try {
                    const validDreams = this.dreams.filter(d => !d.forgot && d.content.trim().length > 0).map(d => d.content);
                    if (validDreams.length === 0) {
                        this.aiError = "Zapisz najpierw jakieś szczegółowe sny, żeby sztuczna inteligencja miała co analizować! ☁️";
                        this.isAnalyzing = false;
                        this.render();
                        return;
                    }

                    const prompt = `Przeanalizuj poniższe wpisy z pamiętnika snów i znajdź w nich powtarzające się motywy, ukryte znaczenia lub ciekawe koncepty (maksymalnie 4). \nSny:\n${validDreams.map((d, i) => `${i+1}. ${d}`).join('\n')}\nWygeneruj odpowiedź w języku polskim w formacie JSON z polami: name (nazwa konceptu/motywu), emoji (jedno pasujące emoji), description (krótki, uroczy i zachęcający opis analizujący znaczenie, używaj słów pasujących do sennego, magicznego klimatu).`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { concepts: { type: "ARRAY", items: { type: "OBJECT", properties: { name: { type: "STRING" }, emoji: { type: "STRING" }, description: { type: "STRING" } } } } } } }
                        })
                    });

                    if (!response.ok) throw new Error("API Error");
                    const data = await response.json();
                    const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (resultText) {
                        const parsed = JSON.parse(resultText);
                        this.concepts = parsed.concepts || [];
                    }
                } catch (e) {
                    console.error(e);
                    this.aiError = "Ojej! Chmurki zakryły połączenie z magią AI. Upewnij się że masz połączenie i spróbuj ponownie! 🌧️";
                } finally {
                    this.isAnalyzing = false;
                    this.render();
                }
            },

            openModal() {
                this.resetForm();
                document.getElementById('dream-modal').classList.remove('hidden');
            },

            closeModal() {
                document.getElementById('dream-modal').classList.add('hidden');
            },

            openModalForDate(dateStr) {
                const dream = this.dreams.find(d => d.date === dateStr);
                document.getElementById('form-date').value = dateStr;
                
                if (dream) {
                    document.getElementById('form-forgot').checked = dream.forgot;
                    document.getElementById('form-content').value = dream.forgot ? '' : dream.content;
                    this.setFormCategory(dream.category || '');
                    this.setFormMood(dream.mood || '');
                } else {
                    this.resetForm(dateStr);
                }
                
                this.toggleForgotState();
                document.getElementById('dream-modal').classList.remove('hidden');
            },

            resetForm(forcedDate = null) {
                document.getElementById('form-date').value = forcedDate || this.getTodayString();
                document.getElementById('form-forgot').checked = false;
                document.getElementById('form-content').value = '';
                this.setFormCategory('');
                this.setFormMood('');
                this.toggleForgotState();
            },

            setFormCategory(catId) {
                this.formCategory = catId;
                this.renderCategoryButtons();
                this.validateForm();
            },

            setFormMood(moodId) {
                this.formMood = moodId;
                this.renderMoodButtons();
            },

            renderCategoryButtons() {
                const container = document.getElementById('category-container');
                let html = '';
                CATEGORIES.forEach(cat => {
                    const isActive = this.formCategory === cat.id;
                    const classes = isActive ? `${cat.color} shadow-md scale-[1.02] border-transparent` : `bg-gray-100 dark:bg-slate-700 text-gray-500 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-600 border-transparent`;
                    html += `<button onclick="app.setFormCategory('${cat.id}')" class="p-3 rounded-xl font-bold transition-all border ${classes}">${cat.label}</button>`;
                });
                container.innerHTML = html;
            },

            renderMoodButtons() {
                const container = document.getElementById('mood-container');
                let html = '';
                MOODS.forEach(mood => {
                    const isActive = this.formMood === mood.id;
                    const classes = isActive ? `bg-[#ffc8dd] dark:bg-gold-500 text-white dark:text-navy-900 shadow-md scale-110` : `bg-gray-100 dark:bg-slate-700 text-gray-500 hover:bg-gray-200 dark:hover:bg-slate-600`;
                    html += `
                        <button onclick="app.setFormMood('${mood.id}')" title="${mood.label}" class="w-12 h-12 rounded-full text-2xl flex items-center justify-center transition-all ${classes}">
                            ${mood.emoji}
                        </button>
                    `;
                });
                container.innerHTML = html;
            },

            toggleForgotState() {
                const isForgot = document.getElementById('form-forgot').checked;
                const detailsDiv = document.getElementById('form-details');
                
                if (isForgot) {
                    detailsDiv.style.opacity = '0.5';
                    detailsDiv.style.pointerEvents = 'none';
                } else {
                    detailsDiv.style.opacity = '1';
                    detailsDiv.style.pointerEvents = 'auto';
                }
                this.validateForm();
            },

            validateForm() {
                const isForgot = document.getElementById('form-forgot').checked;
                const content = document.getElementById('form-content').value.trim();
                const btnSave = document.getElementById('btn-save');
                
                if (isForgot || content.length > 0) {
                    btnSave.removeAttribute('disabled');
                } else {
                    btnSave.setAttribute('disabled', 'true');
                }
            },

            createParticleBurst(x, y) {
                const container = document.getElementById('star-container');
                if (!container) return;
                const colors = ['#ffc8dd', '#a2d2ff', '#cdb4db', '#fbbf24', '#ffffff'];
                for(let i=0; i<25; i++) {
                    const p = document.createElement('div');
                    p.className = 'absolute pointer-events-none z-50 rounded-full';
                    const size = Math.random() * 8 + 4;
                    p.style.width = `${size}px`;
                    p.style.height = `${size}px`;
                    p.style.left = `${x}px`;
                    p.style.top = `${y}px`;
                    p.style.background = colors[Math.floor(Math.random() * colors.length)];
                    p.style.boxShadow = `0 0 8px ${p.style.background}`;
                    container.appendChild(p);
                    
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 80 + 30;
                    const tx = Math.cos(angle) * distance;
                    const ty = Math.sin(angle) * distance;
                    
                    const anim = p.animate([
                        { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                        { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
                    ], { duration: 800 + Math.random()*400, easing: 'cubic-bezier(0.25, 1, 0.5, 1)' });
                    anim.onfinish = () => p.remove();
                }
            },

            saveDream(event) {
                if (event) {
                    const rect = event.target.getBoundingClientRect();
                    this.createParticleBurst(rect.left + rect.width/2, rect.top + rect.height/2);
                }

                const date = document.getElementById('form-date').value;
                const isForgot = document.getElementById('form-forgot').checked;
                const content = document.getElementById('form-content').value;

                const newDream = {
                    id: Date.now().toString(),
                    date: date,
                    content: isForgot ? 'Nie pamiętam dzisiejszego snu...' : content,
                    category: isForgot ? null : this.formCategory,
                    mood: isForgot ? null : this.formMood,
                    forgot: isForgot,
                };

                this.dreams = this.dreams.filter(d => d.date !== date);
                this.dreams.push(newDream);
                this.dreams.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                this.saveToLocal();
                this.closeModal();
                this.render();
            },

            initCursorStars() {
                const starContainer = document.getElementById('star-container');
                if (!starContainer) return;
                let lastStarTime = 0;

                window.addEventListener('mousemove', (e) => {
                    const now = Date.now();
                    if (now - lastStarTime < 40) return;
                    lastStarTime = now;

                    const star = document.createElement('div');
                    star.className = 'absolute pointer-events-none z-50';
                    star.style.left = `${e.clientX}px`;
                    star.style.top = `${e.clientY}px`;
                    
                    const isDark = document.documentElement.classList.contains('dark');
                    const fill = isDark ? "#FDE047" : "#E8E8E8";
                    const stroke = isDark ? "#D4AF37" : "#B0B0B0";

                    star.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="${fill}" stroke="${stroke}" stroke-width="1" style="filter: drop-shadow(0px 0px 3px rgba(255,255,255,0.5));"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>`;

                    starContainer.appendChild(star);

                    const animation = star.animate([
                        { transform: 'translate(-50%, -50%) scale(1) rotate(0deg)', opacity: 1 },
                        { transform: 'translate(-50%, 60px) scale(0.3) rotate(180deg)', opacity: 0 }
                    ], { duration: 900, easing: 'ease-out' });

                    animation.onfinish = () => star.remove();

                    // --- Magiczny Ślad (Ogon) ---
                    const trail = document.createElement('div');
                    trail.className = 'absolute pointer-events-none z-40 rounded-full';
                    trail.style.width = '24px';
                    trail.style.height = '24px';
                    trail.style.left = `${e.clientX}px`;
                    trail.style.top = `${e.clientY}px`;
                    trail.style.transform = 'translate(-50%, -50%)';
                    trail.style.background = isDark ? 'radial-gradient(circle, rgba(212,175,55,0.4) 0%, transparent 70%)' : 'radial-gradient(circle, rgba(255,181,167,0.5) 0%, transparent 70%)';
                    
                    starContainer.appendChild(trail);
                    const trailAnim = trail.animate([
                        { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                        { transform: 'translate(-50%, -50%) scale(0.2)', opacity: 0 }
                    ], { duration: 500, easing: 'ease-out' });
                    trailAnim.onfinish = () => trail.remove();
                });
            },

            // --- NOWE FUNKCJE (Komety, Toasty, Reality Check) ---
            initComets() {
                setInterval(() => {
                    // Kometa pojawia się losowo (ok. 40% szans)
                    if(Math.random() > 0.4) return;

                    const container = document.getElementById('comet-container');
                    if (!container) return;

                    const comet = document.createElement('div');
                    comet.className = 'absolute pointer-events-auto cursor-pointer animate-comet z-0';
                    
                    const isDark = document.documentElement.classList.contains('dark');
                    const fill = isDark ? "#FDE047" : "#FFFFFF";
                    const tail = isDark ? "rgba(212, 175, 55, 0.8)" : "rgba(255, 255, 255, 0.8)";

                    comet.innerHTML = `
                        <svg width="100" height="40" viewBox="0 0 100 40">
                            <defs>
                                <linearGradient id="cometGrad" x1="0%" y1="50%" x2="100%" y2="50%">
                                    <stop offset="0%" stop-color="${tail}" stop-opacity="0" />
                                    <stop offset="100%" stop-color="${tail}" stop-opacity="1" />
                                </linearGradient>
                            </defs>
                            <path d="M0 20 L80 15 L100 20 L80 25 Z" fill="url(#cometGrad)" />
                            <circle cx="90" cy="20" r="6" fill="${fill}" style="filter: drop-shadow(0 0 10px ${fill})" />
                        </svg>
                    `;

                    comet.onclick = (e) => {
                        e.stopPropagation();
                        this.playMagicClick();
                        this.showToast("🌠 Złapałaś spadającą gwiazdę! Pomyśl życzenie!");
                        comet.style.opacity = '0';
                        setTimeout(() => comet.remove(), 300);
                    };

                    container.appendChild(comet);

                    setTimeout(() => { if (comet.parentNode) comet.remove(); }, 4000);
                }, 10000); // Sprawdza szansę co 10 sekund
            },

            showToast(message) {
                const container = document.getElementById('toast-container');
                if (!container) return;

                const toast = document.createElement('div');
                toast.className = 'bg-white/90 dark:bg-slate-800/90 backdrop-blur-md px-6 py-3 rounded-full shadow-lg border-2 border-[#ffb5a7] dark:border-gold-500 text-[#ffb5a7] dark:text-gold-500 font-bold modal-enter';
                toast.innerText = message;

                container.appendChild(toast);

                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(10px)';
                    toast.style.transition = 'all 0.3s';
                    setTimeout(() => toast.remove(), 300);
                }, 3500); // Znika po 3.5s
            },

            doRealityCheck() {
                this.playMagicClick();
                this.showToast("👁️✨ Reality Check: Policz palce u dłoni, czy na pewno nie śnisz?");
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
